# =============================================
# gateway Nginx에 추가할 LMS 가상호스트 블록
# 대상: /home/gateway/nginx/nginx.conf
# 기존 마지막 server { } 블록 바로 앞에 삽입
# SSL 인증서 발급 후 활성화할 것
# =============================================

    server {
        listen 443 ssl;
        server_name zslab-lms.duckdns.org;

        ssl_certificate     /etc/nginx/certs/zslab-lms.duckdns.org/fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/zslab-lms.duckdns.org/privkey.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;

        client_max_body_size 50m;

        # ── Socket.io: /ws/* → lms_realtime:3001/ 직접 (Caddy 우회)
        location /ws/ {
            proxy_pass          http://lms_realtime:3001/;

            proxy_http_version  1.1;
            proxy_set_header    Upgrade     $http_upgrade;
            proxy_set_header    Connection  $connection_upgrade;
            proxy_set_header    Host        $host;
            proxy_set_header    X-Real-IP   $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;

            proxy_buffering     off;
        }

        # ── 나머지 → lms_caddy (API + Next.js)
        location / {
            set $upstream_lms http://lms_caddy:8080;
            proxy_pass $upstream_lms;
        }
    }
