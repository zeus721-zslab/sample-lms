name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Laravel 백엔드 테스트 ─────────────────────
  backend:
    name: Backend (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lms_test
        ports: ["3306:3306"]
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, pdo_sqlite, sqlite3, redis, intl, zip, bcmath, gd, opcache, pcntl, sockets, mbstring
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy env
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Prepare storage directories
        run: mkdir -p backend/storage/framework/{cache,sessions,views,testing} && chmod -R 777 backend/storage backend/bootstrap/cache

      - name: Run migrations
        working-directory: backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: lms_test
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
        run: php artisan migrate --force

      - name: Run Feature tests (SQLite in-memory)
        working-directory: backend
        env:
          ELASTICSEARCH_ENABLED: "false"
        run: php artisan test --testsuite=Feature

  # ── Next.js 프론트엔드 빌드·타입 검사 ─────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://zslab-lms.duckdns.org/api
          NEXT_PUBLIC_SOCKET_URL: https://zslab-lms.duckdns.org/ws
          NEXT_PUBLIC_CHAT_URL: https://zslab-lms.duckdns.org/chat
        run: npm run build

  # ── Node.js 실시간 서버 ───────────────────────
  realtime:
    name: Realtime (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: node-realtime/package-lock.json

      - name: Install dependencies
        working-directory: node-realtime
        run: npm ci

      - name: Syntax check
        working-directory: node-realtime
        run: node --check src/index.js
